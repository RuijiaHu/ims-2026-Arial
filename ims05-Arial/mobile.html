<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Make Your Star</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a12;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px 40px;
      gap: 24px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #fff;
      margin-top: 8px;
    }

    #preview-wrap {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      overflow: hidden;
      background: #111;
      flex-shrink: 0;
    }

    #preview-wrap canvas { display: block; }

    .form {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 13px;
      color: #aaa;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input[type="text"] {
      background: #1a1a2a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 18px;
      padding: 12px 16px;
      width: 100%;
      outline: none;
    }

    input[type="text"]:focus { border-color: #666; }

    .initials-preview {
      font-size: 13px;
      color: #666;
      padding-left: 4px;
    }

    .initials-preview span {
      color: #fff;
      font-weight: 600;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    input[type="color"] {
      -webkit-appearance: none;
      appearance: none;
      width: 52px;
      height: 52px;
      border: none;
      border-radius: 50%;
      background: none;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
    }

    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

    .hue-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right,
        hsl(0,80%,60%), hsl(30,80%,60%), hsl(60,80%,60%),
        hsl(90,80%,60%), hsl(120,80%,60%), hsl(150,80%,60%),
        hsl(180,80%,60%), hsl(210,80%,60%), hsl(240,80%,60%),
        hsl(270,80%,60%), hsl(300,80%,60%), hsl(330,80%,60%),
        hsl(360,80%,60%)
      );
      outline: none;
    }

    .hue-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      cursor: pointer;
    }

    /* generic slider style shared by size, opacity, glow */
    .generic-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #333;
      outline: none;
    }

    .generic-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      cursor: pointer;
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }

    button {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      padding: 16px;
      width: 100%;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.15s;
    }

    button:active { opacity: 0.7; }

    button:disabled {
      background: #333;
      color: #666;
      cursor: default;
    }

    #status {
      font-size: 14px;
      color: #888;
      text-align: center;
      min-height: 20px;
    }

    #status.success { color: #7fff7f; }
    #status.error   { color: #ff7f7f; }
  </style>
</head>

<body>
  <h1>Make Your Star ✦</h1>

  <div id="preview-wrap"></div>

  <div class="form">

    <div class="field">
      <label>Your Name</label>
      <input type="text" id="nameInput" placeholder="e.g. Ruijia Hu" maxlength="40">
      <div class="initials-preview">
        Initials on star: <span id="initialsDisplay">—</span>
      </div>
    </div>

    <div class="field">
      <label>Color</label>
      <div class="color-row">
        <input type="color" id="colorPicker" value="#ff4444">
        <input type="range" class="hue-slider" id="hueSlider" min="0" max="360" value="0">
      </div>
    </div>

    <div class="field">
      <label>Size</label>
      <input type="range" class="generic-slider" id="sizeSlider" min="15" max="45" value="30">
      <div class="slider-labels"><span>Small</span><span>Large</span></div>
    </div>

    <div class="field">
      <label>Opacity</label>
      <input type="range" class="generic-slider" id="opacitySlider" min="20" max="100" value="80">
      <div class="slider-labels"><span>Transparent</span><span>Solid</span></div>
    </div>

    <div class="field">
      <label>Glow</label>
      <input type="range" class="generic-slider" id="glowSlider" min="0" max="40" value="10">
      <div class="slider-labels"><span>None</span><span>Strong</span></div>
    </div>

    <button id="submitBtn" disabled>Send to the Sky ✦</button>
    <div id="status"></div>

  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAR0ket_gSc2vVQShLtqIfx1b_nnYhr6yo",
      authDomain: "star-45c8e.firebaseapp.com",
      databaseURL: "https://star-45c8e-default-rtdb.firebaseio.com",
      projectId: "star-45c8e",
      storageBucket: "star-45c8e.firebasestorage.app",
      messagingSenderId: "545647656558",
      appId: "1:545647656558:web:5bffe5500486d34948707f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentHue      = 0;
    let currentSize     = 30;
    let currentInitials = "";
    let currentOpacity  = 80;   // 20–100
    let currentGlow     = 10;   // 0–40

    function extractInitials(name) {
      return name.trim()
        .split(/\s+/)
        .filter(w => w.length > 0)
        .map(w => w[0].toUpperCase())
        .join("")
        .slice(0, 3);
    }

    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const k = (n + h / 30) % 12;
        return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
      };
      return "#" + [f(0), f(8), f(4)].map(x =>
        Math.round(x * 255).toString(16).padStart(2, "0")
      ).join("");
    }

    const nameInput       = document.getElementById("nameInput");
    const initialsDisplay = document.getElementById("initialsDisplay");
    const colorPicker     = document.getElementById("colorPicker");
    const hueSlider       = document.getElementById("hueSlider");
    const sizeSlider      = document.getElementById("sizeSlider");
    const opacitySlider   = document.getElementById("opacitySlider");
    const glowSlider      = document.getElementById("glowSlider");
    const submitBtn       = document.getElementById("submitBtn");
    const statusEl        = document.getElementById("status");

    nameInput.addEventListener("input", () => {
      currentInitials = extractInitials(nameInput.value);
      initialsDisplay.textContent = currentInitials || "—";
      submitBtn.disabled = currentInitials.length === 0;
    });

    hueSlider.addEventListener("input", () => {
      currentHue = parseInt(hueSlider.value);
      colorPicker.value = hslToHex(currentHue, 80, 60);
    });

    colorPicker.addEventListener("input", () => {
      const hex = colorPicker.value;
      const r = parseInt(hex.slice(1,3),16)/255;
      const g = parseInt(hex.slice(3,5),16)/255;
      const b = parseInt(hex.slice(5,7),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      let h = 0;
      if (max !== min) {
        const d = max - min;
        switch(max) {
          case r: h = ((g-b)/d + (g<b?6:0)) * 60; break;
          case g: h = ((b-r)/d + 2) * 60; break;
          case b: h = ((r-g)/d + 4) * 60; break;
        }
      }
      currentHue = Math.round(h);
      hueSlider.value = currentHue;
    });

    sizeSlider.addEventListener("input",    () => { currentSize    = parseInt(sizeSlider.value);    });
    opacitySlider.addEventListener("input", () => { currentOpacity = parseInt(opacitySlider.value); });
    glowSlider.addEventListener("input",    () => { currentGlow    = parseInt(glowSlider.value);    });

    submitBtn.addEventListener("click", () => {
      if (!currentInitials) return;

      submitBtn.disabled = true;
      statusEl.textContent = "Sending...";
      statusEl.className = "";

      const starData = {
        initials:  currentInitials,
        hue:       currentHue,
        size:      currentSize,
        opacity:   currentOpacity,
        glow:      currentGlow,
        timestamp: Date.now()
      };

      db.ref("stars").push(starData)
        .then(() => {
          statusEl.textContent = "Your star is in the sky ✦";
          statusEl.className = "success";
          setTimeout(() => {
            submitBtn.disabled = false;
            statusEl.textContent = "";
          }, 3000);
        })
        .catch(err => {
          statusEl.textContent = "Error: " + err.message;
          statusEl.className = "error";
          submitBtn.disabled = false;
        });
    });

    // ── p5 preview ────────────────────────────────────────────
    new p5(function(p) {
      let nodes = 5;
      let nodeX      = new Array(5).fill(0);
      let nodeY      = new Array(5).fill(0);
      let nodeStartX = new Array(5).fill(0);
      let nodeStartY = new Array(5).fill(0);
      let angle      = new Array(5).fill(0);
      let frequency  = [];
      let accelX = 0, accelY = 0;
      let centerX, centerY;
      let organicConstant = 1.0;
      let noiseOX, noiseOY;
      let rotAngle = -90;

      p.setup = function() {
        let cnv = p.createCanvas(200, 200);
        cnv.parent("preview-wrap");
        p.angleMode(p.DEGREES);
        p.noStroke();
        p.colorMode(p.HSB, 360, 100, 100, 100);

        centerX = 100; centerY = 100;
        noiseOX = p.random(1000);
        noiseOY = p.random(1000);
        for (let i = 0; i < 5; i++) frequency[i] = p.random(5, 12);
      };

      p.draw = function() {
        p.background(240, 30, 8, 50);

        noiseOX += 0.005; noiseOY += 0.005;
        let tx = p.map(p.noise(noiseOX), 0, 1, 60, 140);
        let ty = p.map(p.noise(noiseOY), 0, 1, 60, 140);

        let dx = (tx - centerX) * 0.0009;
        let dy = (ty - centerY) * 0.0009;
        accelX += dx; accelY += dy;
        centerX += accelX; centerY += accelY;
        accelX *= 0.98; accelY *= 0.98;

        organicConstant = 1 - (Math.abs(accelX) + Math.abs(accelY)) * 0.1;

        rotAngle = -90;
        let r = currentSize * (200 / 90);
        for (let i = 0; i < nodes; i++) {
          nodeStartX[i] = centerX + p.cos(rotAngle) * r;
          nodeStartY[i] = centerY + p.sin(rotAngle) * r;
          rotAngle += 360 / nodes;
        }

        for (let i = 0; i < nodes; i++) {
          nodeX[i] = nodeStartX[i] + p.sin(angle[i]) * (accelX * 2);
          nodeY[i] = nodeStartY[i] + p.sin(angle[i]) * (accelY * 2);
          angle[i] += frequency[i];
        }

        p.curveTightness(organicConstant);

        // glow: draw several larger blurred copies behind the star
        let glowLayers = Math.floor(currentGlow / 8);
        for (let g = glowLayers; g > 0; g--) {
          let glowR = r + g * (currentGlow * 0.3);
          let glowAlpha = (currentOpacity / 100) * 20 * (1 - g / (glowLayers + 1));
          p.fill(currentHue, 70, 100, glowAlpha);
          p.curveTightness(organicConstant);
          p.beginShape();
          for (let i = 0; i < nodes; i++) {
            let gx = centerX + (nodeX[i] - centerX) * (glowR / r);
            let gy = centerY + (nodeY[i] - centerY) * (glowR / r);
            p.curveVertex(gx, gy);
          }
          p.endShape(p.CLOSE);
        }

        // main star
        let alpha = map(currentOpacity, 20, 100, 20, 100);
        p.fill(currentHue, 80, 100, alpha);
        p.beginShape();
        for (let i = 0; i < nodes; i++) {
          p.curveVertex(nodeX[i], nodeY[i]);
        }
        p.endShape(p.CLOSE);

        // initials
        if (currentInitials) {
          p.colorMode(p.RGB);
          p.fill(0, 0, 0, 180);
          p.noStroke();
          let fontSize = currentInitials.length > 2 ? 20 : 26;
          p.textSize(fontSize);
          p.textAlign(p.CENTER, p.CENTER);
          p.textStyle(p.BOLD);
          p.text(currentInitials, centerX, centerY);
          p.colorMode(p.HSB, 360, 100, 100, 100);
        }
      };

      function map(v, a, b, c, d) {
        return c + (v - a) / (b - a) * (d - c);
      }
    });
  </script>
</body>
</html>
